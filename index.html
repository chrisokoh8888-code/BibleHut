<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibleHut Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📖 BibleHut Hub</h1>
    <p>Select a game mode:</p>
    <select id="game-selector">
      <option value="fill">Fill-in-the-Blank</option>
      <option value="guess">Guess the Character</option>
      <option value="trivia">Trivia / Multiple Choice</option>
      <option value="scramble">Word Scramble</option>
      <option value="verse-match">Verse Match</option>
    </select>
    <button id="start-game">Start Game</button>
    <div id="leaderboard-container">
      <h2>🏆 Leaderboard</h2>
      <ul id="leaderboard-list"></ul>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const startBtn = document.getElementById("start-game");
  const selector = document.getElementById("game-selector");

  startBtn.addEventListener("click", () => {
    const selectedGame = selector.value;

    // Pass selected game to next page
    window.location.href = `game.html?type=${selectedGame}`;
  });
});
</script>
</body>
</html>
