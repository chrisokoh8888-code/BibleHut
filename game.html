<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibleHut Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>BibleHut Game</h1>
    <div id="game-container"></div>
    <div id="score-container" class="hidden">
      <h2>🎉 Your Score: <span id="score">0</span></h2>
      <button id="play-again">Play Again</button>
    </div>
    <div id="leaderboard-container">
      <h2>🏆 Leaderboard</h2>
      <ul id="leaderboard-list"></ul>
    </div>
    <select id="game-selector">
      <option value="fill">Fill-in-the-Blank</option>
      <option value="guess">Guess the Character</option>
      <option value="trivia">Trivia / Multiple Choice</option>
      <option value="scramble">Word Scramble</option>
      <option value="verse-match">Verse Match</option>
    </select>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
